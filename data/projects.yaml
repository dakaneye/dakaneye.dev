featured:
  - name: claude-sandbox
    repo: https://github.com/dakaneye/claude-sandbox
    language: Go
    description: >-
      Autonomous Claude execution environment. Runs implementations in
      sandboxed Docker containers with git worktree isolation, quality gates,
      and automatic PR creation. Give it a task, let it work in a safe box,
      get a PR back.

  - name: kora
    repo: https://github.com/dakaneye/kora
    language: Go
    description: >-
      CLI that aggregates work activity from GitHub, Gmail, Calendar, and
      Linear into structured JSON. Designed as a data layer for AI-powered
      workflows — morning briefs, weekly digests, status reports. The boring
      plumbing that makes the interesting stuff possible.

  - name: word-clock
    repo: https://github.com/dakaneye/word-clock
    language: C++
    description: >-
      Arduino-powered clock that displays time in English words on a laser-cut
      panel. Has a birthday mode. The kind of project that starts as "this
      will take a weekend" and doesn't.

  - name: copilot-overlay
    repo: https://github.com/dakaneye/copilot-overlay
    language: TypeScript
    description: >-
      Chrome extension that shows your Copilot Money budget on shopping and
      food delivery checkout pages. Uses native host messaging and macOS
      Keychain for credentials. Built because I kept overspending on DoorDash.

  - name: copilot-money-mcp
    repo: https://github.com/dakaneye/copilot-money-mcp
    language: TypeScript
    description: >-
      MCP server for the Copilot Money API. Transaction management,
      categorization, tagging, budgeting — all accessible to AI assistants.
      Companion to copilot-overlay.

  - name: claude-review-code
    repo: https://github.com/dakaneye/claude-review-code
    language: Python
    description: >-
      Code review skill for Claude Code with 12 specialized subagents.
      Language-specific checklists for Go, Node, Java, Python, Bash, and
      Terraform. Includes AI-generated code detection patterns.

